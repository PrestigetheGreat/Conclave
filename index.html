<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONCLAVE</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- VIDEO BACKGROUND -->
  <div class="video-container">
    <video class="video-slide active" autoplay muted playsinline loop>
      <source src="videos/video1.mp4" type="video/mp4" />
    </video>
    <video class="video-slide" autoplay muted playsinline loop>
      <source src="videos/video2.mp4" type="video/mp4" />
    </video>
    <video class="video-slide" autoplay muted playsinline loop>
      <source src="videos/video3.mp4" type="video/mp4" />
    </video>
    <video class="video-slide" autoplay muted playsinline loop>
      <source src="videos/video4.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="content">

    <!-- LOGO PLACEHOLDER -->
    <div class="logo-placeholder">
      <!-- DROP LOGO FILE HERE WHEN READY -->
      <img src="" alt="CONCLAVE" id="logo" class="logo hidden" />
    </div>

    <!-- BRAND NAME -->
    <h1 class="brand-name">CONCLAVE</h1>

    <!-- TAGLINE -->
    <p class="tagline">we choose the music we want</p>

    <!-- EMAIL SIGN UP -->
    <div class="signup">
      <input type="email" placeholder="enter your email" class="email-input" />
      <button class="signup-btn">SIGN UP</button>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <a href="https://instagram.com/conclave.rave/" target="_blank" class="footer-link">INSTAGRAM</a>
    <a href="#" target="_blank" class="footer-link tiktok-placeholder">TIKTOK</a>
    <p class="footer-copy">© CONCLAVE 2025</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
