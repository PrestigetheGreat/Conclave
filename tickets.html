<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONCLAVE — TICKETS</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Courier Prime', Courier, monospace;
      overflow: hidden;
    }

    /* BACKGROUND VIDEO */
    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    /* TOP CORNERS */
    .top-left {
      position: fixed;
      top: 1.25rem;
      left: 1.5rem;
      z-index: 10;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: #fff;
      text-transform: uppercase;
      opacity: 0.5;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .top-left:hover { opacity: 1; }

    .top-right {
      position: fixed;
      top: 1.25rem;
      right: 1.5rem;
      z-index: 10;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: #fff;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .top-divider {
      position: fixed;
      top: 3rem;
      left: 0;
      width: 100%;
      height: 0.5px;
      background: rgba(255,255,255,0.25);
      z-index: 10;
    }

    /* ALBUM STRIP */
    .album-strip-wrapper {
      position: fixed;
      top: 3.5rem;
      left: 0;
      width: 100%;
      overflow: hidden;
      z-index: 2;
      height: 70px;
      display: flex;
      align-items: center;
    }

    .album-strip {
      display: flex;
      gap: 8px;
      width: max-content;
      animation: scrollLeft 18s linear infinite;
    }

    .album-strip img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    @keyframes scrollLeft {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* DIVIDER UNDER ALBUM STRIP */
    .album-divider {
      position: fixed;
      top: 8rem;
      left: 0;
      width: 100%;
      height: 0.5px;
      background: rgba(255,255,255,0.25);
      z-index: 10;
    }

    /* TICKETS MESSAGE — strictly between album divider and deck section */
    .content {
      position: fixed;
      top: 8rem;
      left: 0;
      width: 100vw;
      bottom: 18rem;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.5rem;
      padding: 1rem 2rem;
    }

    .message {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      display: block;
      white-space: nowrap;
    }

    /* BOXED TICKET LINK */
    .ticket-link {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 0.75rem 1.25rem;
      background: transparent;
      text-transform: uppercase;
      white-space: nowrap;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .ticket-link:hover {
      background: #fff;
      color: #000;
    }

    /* DECK SECTION */
    .deck-section {
      position: fixed;
      bottom: 3.5rem;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 5;
    }

    .deck-divider-top {
      width: 100%;
      height: 0.5px;
      background: rgba(255,255,255,0.25);
      margin-bottom: 1.25rem;
    }

    .deck-divider-bottom {
      width: 100%;
      height: 0.5px;
      background: rgba(255,255,255,0.25);
      margin-top: 1.25rem;
    }

    /* DECK OF CARDS */
    .deck {
      position: relative;
      width: 140px;
      height: 210px;
    }

    .card {
      position: absolute;
      width: 140px;
      height: 210px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.4);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .card:nth-child(1) { transform: rotate(-12deg) translateX(-160px); z-index: 1; }
    .card:nth-child(2) { transform: rotate(-6deg) translateX(-80px); z-index: 2; }
    .card:nth-child(3) { transform: rotate(0deg) translateX(0px); z-index: 3; }
    .card:nth-child(4) { transform: rotate(6deg) translateX(80px); z-index: 2; }
    .card:nth-child(5) { transform: rotate(12deg) translateX(160px); z-index: 1; }

    @media (hover: hover) {
      .card:hover {
        transform: rotate(0deg) translateX(0px) scale(1.9) translateY(-25px) !important;
        z-index: 100 !important;
        box-shadow: 10px 10px 40px rgba(0,0,0,0.5);
      }
    }

    .card.active {
      transform: rotate(0deg) translateX(0px) scale(1.7) translateY(-25px) !important;
      z-index: 100 !important;
      box-shadow: 10px 10px 40px rgba(0,0,0,0.5);
    }

    /* FOOTER */
    .footer {
      position: fixed;
      bottom: 1.25rem;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      z-index: 10;
      padding: 0 1.5rem;
    }

    .footer-link {
      color: #fff;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      opacity: 0.5;
      transition: opacity 0.2s ease;
    }

    .footer-link:hover { opacity: 1; }

    .footer-copy {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: #fff;
      opacity: 0.35;
    }

    @media (max-width: 600px) {
      .card:nth-child(1) { transform: rotate(-12deg) translateX(-100px); }
      .card:nth-child(2) { transform: rotate(-6deg) translateX(-50px); }
      .card:nth-child(3) { transform: rotate(0deg) translateX(0px); }
      .card:nth-child(4) { transform: rotate(6deg) translateX(50px); }
      .card:nth-child(5) { transform: rotate(12deg) translateX(100px); }
      .card.active { transform: rotate(0deg) translateX(0px) scale(1.4) translateY(-20px) !important; }
      .ticket-link { font-size: 0.55rem; padding: 0.6rem 0.75rem; letter-spacing: 0.1em; }
      .message { font-size: 0.6rem; letter-spacing: 0.2em; }
      .footer { gap: 1rem; flex-wrap: wrap; }
    }
  </style>
</head>

  <script>
    const video = document.querySelector('.video-container video');
    if (video) {
      video.muted = true;
      video.play().catch(() => {});
    }

    const cards = document.querySelectorAll('.card');
    const isTouchDevice = () => window.matchMedia('(hover: none)').matches;

    cards.forEach(card => {
      card.addEventListener('touchstart', function(e) {
        if (!isTouchDevice()) return;
        e.preventDefault();
        e.stopPropagation();
        const isActive = this.classList.contains('active');
        cards.forEach(c => c.classList.remove('active'));
        if (!isActive) this.classList.add('active');
      }, { passive: false });
    });

    document.addEventListener('touchstart', function(e) {
      if (!e.target.closest('.card')) {
        cards.forEach(c => c.classList.remove('active'));
      }
    });
  </script>
