<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONCLAVE — TICKETS</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      color: #000;
      font-family: 'Courier Prime', Courier, monospace;
      overflow: hidden;
    }

    /* LEFT VIDEO — fills left half */
    .video-left {
      position: fixed;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .video-left video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.5;
    }

    /* RIGHT VIDEO — fills right half */
    .video-right {
      position: fixed;
      top: 0;
      right: 0;
      width: 50%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .video-right video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.5;
    }

    /* TOP CORNERS */
    .top-left {
      position: fixed;
      top: 1.25rem;
      left: 1.5rem;
      z-index: 10;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: #000;
      text-transform: uppercase;
      opacity: 0.5;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .top-left:hover { opacity: 1; }

    .top-right {
      position: fixed;
      top: 1.25rem;
      right: 1.5rem;
      z-index: 10;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: #000;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .top-divider {
      position: fixed;
      top: 3rem;
      left: 0;
      width: 100%;
      height: 0.5px;
      background: rgba(0,0,0,0.15);
      z-index: 10;
    }

    /* ALBUM STRIP */
    .album-strip-wrapper {
      position: fixed;
      top: 3.5rem;
      left: 0;
      width: 100%;
      overflow: hidden;
      z-index: 2;
      height: 80px;
      display: flex;
      align-items: center;
    }

    .album-strip-label {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: #000;
      opacity: 0.35;
      text-align: center;
      margin-bottom: 0.4rem;
      text-transform: lowercase;
    }

    .album-strip {
      display: flex;
      gap: 8px;
      width: max-content;
      animation: scrollLeft 18s linear infinite;
    }

    .album-strip img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    @keyframes scrollLeft {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .album-divider {

      left: 0;
